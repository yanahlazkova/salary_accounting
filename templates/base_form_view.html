{% load static %}
<h2 class="mb-4 text-primary">{{ form_title }}</h2>
<div class="mb-3">
    {% for button in toolbar_buttons %}
    {% include 'ui/htmx_button.html' with button=button %}
    {% endfor %}
</div>
<hr>

<div class="row mb-5">

    {% for field in fields %}
        <div class="col-md-6 mb-2">
            <div class="d-flex border-bottom py-2">

                <div class="text-info fw-semibold me-2text-info" style="min-width: 55%;">
                    {{ field.label }}:
                </div>

                <div class="text-info">
                    <strong class="text-secondary">{{ field.value|default:"—" }}</strong>
                </div>

            </div>
        </div>
    {% endfor %}

</div>
